<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kiramitsu Weekly Rekap - HRD System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: 'Inter', sans-serif;
        }

        .card {
            background-color: #1e293b;
            border: 1px solid #334155;
            border-radius: 12px;
        }

        input {
            background-color: #0f172a !important;
            border: 1px solid #475569 !important;
            color: white !important;
            font-size: 0.75rem !important;
            padding: 0.4rem !important;
        }

        .btn-action {
            background-color: #8b5cf6;
            transition: all 0.3s;
        }

        .btn-action:hover {
            background-color: #7c3aed;
            transform: translateY(-2px);
        }

        .btn-discord {
            background-color: #5865F2;
            transition: all 0.3s;
        }

        .btn-discord:hover {
            background-color: #4752c4;
            transform: translateY(-2px);
        }

        .nav-link {
            color: #94a3b8;
            transition: all 0.2s;
        }

        .nav-link:hover {
            color: #3b82f6;
        }

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 10px;
        }

        .qty-input::placeholder {
            color: #475569;
        }

        select {
            background-color: #0f172a !important;
            color: #f8fafc !important;
            border: 1px solid #475569 !important;
        }

        select option {
            background-color: #0f172a;
            color: #f8fafc;
        }
    </style>
</head>

<body class="p-4 md:p-8">
    <div class="max-w-6xl mx-auto">
        <!-- NAVIGATION -->
        <nav class="mb-6 flex items-center justify-between border-b border-slate-800 pb-4">
            <div class="flex gap-4 items-center">
                <a href="index.html" class="nav-link text-sm font-medium">← Menu Utama</a>
                <span class="text-slate-700">|</span>
                <span class="text-purple-400 font-bold tracking-tight italic text-lg uppercase font-black">Weekly HRD Recap</span>
            </div>
            <div class="text-right">
                <span id="displayBadge" class="text-[10px] bg-purple-500/20 text-purple-400 px-3 py-1 rounded-full border border-purple-500/30 font-bold uppercase tracking-widest">ADMIN MODE</span>
            </div>
        </nav>

        <div class="grid grid-cols-1 xl:grid-cols-4 gap-6">
            <!-- INPUT SECTION -->
            <div class="xl:col-span-2 space-y-4 max-h-[85vh] overflow-y-auto pr-2" id="inputContainer">
                <!-- User Profile & Periode -->
                <div class="card p-4 border-purple-500/30 bg-purple-500/5 space-y-3 shadow-lg">
                    <h2 class="text-xs font-black uppercase text-purple-400 tracking-widest flex items-center gap-2">
                        <span>👤</span> Identitas & Periode
                    </h2>
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="text-[9px] text-slate-500 uppercase font-bold">Nama Admin</label>
                            <select id="inputNama" class="w-full p-2 rounded text-sm outline-none" onchange="updateReport()">
                                <option value="Gison Kiramitsu">Gison Kiramitsu</option>
                                <option value="Valish Kiramitsu">Valish Kiramitsu</option>
                                <option value="Nuel Zaverio" selected>Nuel Zaverio</option>
                            </select>
                        </div>
                        <div>
                            <label class="text-[9px] text-slate-500 uppercase font-bold">Jabatan</label>
                            <input type="text" id="inputJabatan" value="HRD" class="w-full rounded outline-none" oninput="updateReport()">
                        </div>
                    </div>
                    <div>
                        <label class="text-[9px] text-slate-500 uppercase font-bold">Range Periode (Teks)</label>
                        <input type="text" id="inputPeriode" value="22 Mar - 28 Mar 2026" class="w-full rounded font-bold text-blue-400 outline-none" oninput="updateReport()">
                    </div>
                </div>

                <div class="flex justify-between items-center px-1">
                    <h2 class="text-sm font-black uppercase text-slate-300 tracking-widest">📝 Penjualan Harian</h2>
                    <span class="text-[10px] text-slate-500 font-mono italic">Input jumlah unit saja</span>
                </div>

                <!-- Data per hari digenerate via JS -->
                <div id="daysWrapper" class="space-y-4 pb-10"></div>
            </div>

            <!-- PREVIEW SECTION -->
            <div class="xl:col-span-2 space-y-4">
                <div class="card p-6 flex flex-col h-full shadow-2xl relative border-t-4 border-t-purple-500">
                    <div class="flex justify-between items-center mb-4 border-b border-slate-700 pb-3">
                        <h2 class="text-lg font-black italic uppercase tracking-tighter">Report Preview</h2>
                        <button onclick="copyReport()" class="bg-slate-700 hover:bg-slate-600 px-4 py-1.5 rounded-lg text-[10px] font-bold uppercase tracking-widest transition-all">Salin Teks</button>
                    </div>

                    <div id="reportPreview" class="bg-black/40 p-5 rounded-xl border border-slate-800 font-mono text-[11px] leading-relaxed whitespace-pre overflow-y-auto h-[500px]">
Laporan akan otomatis ter-generate di sini...
                    </div>

                    <div class="mt-4 space-y-3">
                        <div class="bg-slate-900/80 p-3 rounded-lg border border-slate-800 flex justify-between items-center">
                            <div>
                                <p class="text-[10px] text-slate-500 font-bold uppercase">Grand Total Mingguan</p>
                                <p id="grandTotal" class="text-2xl font-black text-green-400">Rp 0</p>
                            </div>
                            <div class="text-right">
                                <span class="text-[10px] bg-green-500/10 text-green-500 px-2 py-1 rounded border border-green-500/20 font-bold uppercase">Automatic Sync</span>
                            </div>
                        </div>

                        <button id="btnSendDiscord" onclick="sendToDiscord()" class="btn-discord w-full py-4 rounded-xl font-black uppercase tracking-[0.2em] shadow-lg flex items-center justify-center gap-2">
                            <span>🚀</span> KIRIM REKAP KE DISCORD
                        </button>
                        
                        <button onclick="resetData()" class="w-full py-1 text-slate-600 text-[10px] uppercase font-bold tracking-widest hover:text-red-400 transition-colors">Reset Data Mingguan</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const DISCORD_WEBHOOK_URL = "https://discord.com/api/webhooks/1486790427049857235/jRILmwKPQ-905tPaRnqYI-bPn82zFJk67CD3qYe_xTc1IK5WfpBkgsfGass9zMHDWCOS";

        const PRICES = {
            amer: 65000, vodka: 85000, azul: 105000,
            fries: 60000, chips: 70000, rokok: 50000,
            vipBasic: 1500000, vipTema: 2500000
        };

        const dayKeys = ["day1", "day2", "day3", "day4", "day5", "day6", "day7"];

        function formatIDR(num) {
            return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', maximumFractionDigits: 0 }).format(num);
        }

        function createInputFields() {
            const wrapper = document.getElementById('daysWrapper');
            dayKeys.forEach((key, i) => {
                const dayCard = document.createElement('div');
                dayCard.className = 'card p-4 space-y-3 shadow-md hover:border-slate-500 transition-all';
                dayCard.innerHTML = `
                    <div class="flex justify-between items-center border-b border-slate-700 pb-2 mb-2">
                        <input type="text" id="label_${key}" value="TGL.." class="!w-40 !bg-transparent !border-none !p-0 font-black text-blue-400 italic text-sm uppercase tracking-tighter focus:ring-0 outline-none" oninput="updateReport()">
                        <label class="flex items-center gap-2 text-[10px] text-slate-500 cursor-pointer font-bold uppercase">
                            <input type="checkbox" id="skip_${key}" onchange="updateReport()" class="accent-purple-500"> Libur/Tutup
                        </label>
                    </div>
                    <div class="grid grid-cols-4 gap-2">
                        <div class="space-y-1">
                            <label class="text-[8px] text-slate-500 uppercase font-bold ml-1">Amer</label>
                            <input type="number" id="amer_${key}" placeholder="0" class="qty-input w-full rounded outline-none" oninput="updateReport()">
                        </div>
                        <div class="space-y-1">
                            <label class="text-[8px] text-slate-500 uppercase font-bold ml-1">Vodka</label>
                            <input type="number" id="vodka_${key}" placeholder="0" class="qty-input w-full rounded outline-none" oninput="updateReport()">
                        </div>
                        <div class="space-y-1">
                            <label class="text-[8px] text-slate-500 uppercase font-bold ml-1">Azul</label>
                            <input type="number" id="azul_${key}" placeholder="0" class="qty-input w-full rounded outline-none" oninput="updateReport()">
                        </div>
                        <div class="space-y-1">
                            <label class="text-[8px] text-slate-500 uppercase font-bold ml-1">Rokok</label>
                            <input type="number" id="rokok_${key}" placeholder="0" class="qty-input w-full rounded outline-none" oninput="updateReport()">
                        </div>
                    </div>
                    <div class="grid grid-cols-4 gap-2">
                        <div class="space-y-1">
                            <label class="text-[8px] text-slate-500 uppercase font-bold ml-1">Fries</label>
                            <input type="number" id="fries_${key}" placeholder="0" class="qty-input w-full rounded outline-none" oninput="updateReport()">
                        </div>
                        <div class="space-y-1">
                            <label class="text-[8px] text-slate-500 uppercase font-bold ml-1">Chips</label>
                            <input type="number" id="chips_${key}" placeholder="0" class="qty-input w-full rounded outline-none" oninput="updateReport()">
                        </div>
                        <div class="space-y-1">
                            <label class="text-[8px] text-slate-500 uppercase font-bold ml-1">VIP B.</label>
                            <input type="number" id="vipb_${key}" placeholder="0" class="qty-input w-full rounded outline-none" oninput="updateReport()">
                        </div>
                        <div class="space-y-1">
                            <label class="text-[8px] text-slate-500 uppercase font-bold ml-1">VIP T.</label>
                            <input type="number" id="vipt_${key}" placeholder="0" class="qty-input w-full rounded outline-none" oninput="updateReport()">
                        </div>
                    </div>
                    <div>
                        <input type="text" id="note_${key}" placeholder="Tambahkan catatan (opsional)..." class="w-full !p-2 !text-[10px] rounded opacity-60 italic outline-none" oninput="updateReport()">
                    </div>
                `;
                wrapper.appendChild(dayCard);
            });

            // Set default labels
            const defaultLabels = ["SENIN", "SELASA", "RABU", "KAMIS", "JUMAT", "SABTU", "MINGGU"];
            dayKeys.forEach((key, i) => {
                document.getElementById(`label_${key}`).value = defaultLabels[i];
            });
        }

        function updateReport() {
            const nama = document.getElementById('inputNama').value;
            const jabatan = document.getElementById('inputJabatan').value;
            const periode = document.getElementById('inputPeriode').value;

            document.getElementById('displayBadge').innerText = nama.toUpperCase();

            let grandTotal = 0;
            let report = `┏━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┓\n   𝑲𝑰𝑹𝑨𝑴𝑰𝑻𝑺𝑼 𝑾𝑬𝑬𝑲𝑳𝑲 𝑹𝑬𝑲𝑨𝑷 (𝑯𝑹𝑫)\n┗━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┛\n`;
            report += `👤 Admin  : ${nama}\n💼 Jabatan: ${jabatan}\n📅 Range  : ${periode}\n\n`;

            dayKeys.forEach(key => {
                const dayLabel = document.getElementById(`label_${key}`).value;
                const skip = document.getElementById(`skip_${key}`).checked;
                const note = document.getElementById(`note_${key}`).value;

                if (skip) {
                    report += `[ ${dayLabel} ]\n- STATUS : LIBUR / TUTUP\n> NOTE   : ${note || 'TIDAK ADA AKTIVITAS'}\n\n`;
                } else {
                    const qA = parseInt(document.getElementById(`amer_${key}`).value) || 0;
                    const qV = parseInt(document.getElementById(`vodka_${key}`).value) || 0;
                    const qAz = parseInt(document.getElementById(`azul_${key}`).value) || 0;
                    const qF = parseInt(document.getElementById(`fries_${key}`).value) || 0;
                    const qC = parseInt(document.getElementById('chips_' + key).value) || 0;
                    const qR = parseInt(document.getElementById('rokok_' + key).value) || 0;
                    const qVb = parseInt(document.getElementById('vipb_' + key).value) || 0;
                    const qVt = parseInt(document.getElementById('vipt_' + key).value) || 0;

                    const dayTotal = (qA * PRICES.amer) + (qV * PRICES.vodka) + (qAz * PRICES.azul) +
                        (qF * PRICES.fries) + (qC * PRICES.chips) + (qR * PRICES.rokok) +
                        (qVb * PRICES.vipBasic) + (qVt * PRICES.vipTema);

                    grandTotal += dayTotal;

                    report += `[ ${dayLabel} ]\n`;
                    report += `- P. Amer: ${qA} | P. Vodka: ${qV} | P. Azul: ${qAz}\n`;
                    report += `- F. Fries: ${qF} | F. Chips: ${qC} | P. Rokok: ${qR}\n`;
                    report += `- VIP Basic: ${qVb} | VIP Tema: ${qVt}\n`;
                    report += `> INCOME : ${formatIDR(dayTotal)}\n`;
                    if (note) report += `> NOTE   : ${note}\n`;
                    report += `\n`;
                }
            });

            report += `━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n💎 TOTAL MINGGUAN: ${formatIDR(grandTotal)}\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━`;

            document.getElementById('reportPreview').innerText = report;
            document.getElementById('grandTotal').innerText = formatIDR(grandTotal);
        }

        async function sendToDiscord() {
            const reportText = document.getElementById('reportPreview').innerText;
            const btn = document.getElementById('btnSendDiscord');
            
            if (reportText.includes("Laporan akan otomatis")) return;

            try {
                btn.disabled = true;
                btn.innerText = "SEDANG MENGIRIM REKAP...";

                const response = await fetch(DISCORD_WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        content: "## 📊 WEEKLY HRD RECAP - KIRAMITSU\n```" + reportText.replace(/```/g, "") + "```" 
                    })
                });

                if (response.ok) {
                    btn.innerText = "✅ REKAP TERKIRIM KE DISCORD!";
                    btn.style.backgroundColor = "#16a34a";
                    setTimeout(() => {
                        btn.innerText = "🚀 KIRIM REKAP KE DISCORD";
                        btn.style.backgroundColor = "";
                        btn.disabled = false;
                    }, 3000);
                } else {
                    throw new Error("Gagal kirim");
                }
            } catch (error) {
                alert("Kesalahan: Webhook Discord bermasalah.");
                btn.disabled = false;
                btn.innerText = "🚀 KIRIM REKAP KE DISCORD";
            }
        }

        function copyReport() {
            const text = document.getElementById('reportPreview').innerText;
            const el = document.createElement('textarea');
            el.value = text;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            alert("Teks laporan berhasil disalin ke clipboard!");
        }

        function resetData() {
            if (confirm("Hapus semua data mingguan? Tindakan ini tidak bisa dibatalkan.")) {
                document.querySelectorAll('input[type="number"]').forEach(i => i.value = "");
                document.querySelectorAll('input[type="checkbox"]').forEach(i => i.checked = false);
                document.querySelectorAll('.qty-input').forEach(i => i.value = "");
                dayKeys.forEach(key => {
                    document.getElementById(`note_${key}`).value = "";
                });
                updateReport();
            }
        }

        window.onload = () => {
            createInputFields();
            updateReport();
        };
    </script>
</body>

</html>
