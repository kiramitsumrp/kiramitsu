<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kiramitsu - Inbound Materials</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { 
            background: radial-gradient(circle at top right, #2d1b2e, #0f172a); 
            color: #f8fafc; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        .animated-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            opacity: 0.3;
            background: 
                radial-gradient(circle at 20% 30%, #db2777 0%, transparent 25%),
                radial-gradient(circle at 80% 70%, #9d174d 0%, transparent 25%);
            filter: blur(80px);
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(244, 114, 182, 0.1);
            border-radius: 24px;
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .glass-card:hover {
            border-color: rgba(244, 114, 182, 0.3);
            box-shadow: 0 20px 40px -15px rgba(244, 114, 182, 0.1);
        }

        input, select, textarea { 
            background: rgba(15, 23, 42, 0.6) !important; 
            border: 1px solid rgba(244, 114, 182, 0.1) !important; 
            color: white !important; 
            border-radius: 12px;
            transition: all 0.3s ease;
        }

        input:focus, select:focus, textarea:focus {
            border-color: #f472b6 !important;
            background: rgba(15, 23, 42, 0.9) !important;
            outline: none;
            box-shadow: 0 0 15px rgba(244, 114, 182, 0.1);
        }

        .btn-primary { 
            background: linear-gradient(135deg, #f472b6 0%, #be185d 100%);
            transition: all 0.3s ease;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -5px rgba(244, 114, 182, 0.4);
        }

        .image-preview-zone {
            border: 2px dashed rgba(244, 114, 182, 0.2);
            background: rgba(244, 114, 182, 0.02);
            border-radius: 20px;
            transition: all 0.3s ease;
        }

        .image-preview-zone:hover {
            border-color: #f472b6;
            background: rgba(244, 114, 182, 0.05);
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { 
            background: #f472b6; 
            border-radius: 10px;
        }

        .logo-glow {
            filter: drop-shadow(0 0 15px rgba(244, 114, 182, 0.4));
        }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="animated-bg"></div>

    <div class="max-w-7xl mx-auto">
        <!-- HEADER -->
        <nav class="mb-12 flex flex-col md:flex-row items-center justify-between border-b border-white/5 pb-8 gap-6">
            <div class="flex items-center gap-5">
                <img src="kiramitsu.png" alt="Logo" onerror="this.src='https://ui-avatars.com/api/?name=K&background=ec4899&color=fff'" class="w-16 h-16 rounded-full border-2 border-pink-500/30 p-1 logo-glow">
                <div>
                    <h1 class="text-3xl font-black italic tracking-tighter">
                        <span class="text-white">INBOUND</span> <span class="text-pink-500">MATERIALS</span>
                    </h1>
                    <p class="text-[10px] text-pink-400/60 font-black uppercase tracking-[0.3em] mt-1">Supply Chain Management System</p>
                </div>
            </div>

            <div class="flex items-center gap-6">
                <a href="index.html" class="text-[10px] font-black uppercase tracking-widest text-slate-400 hover:text-pink-400 transition-all flex items-center gap-2">
                    <span class="text-lg">←</span> Back to Dashboard
                </a>
                <div class="h-10 w-[1px] bg-white/10"></div>
                <div class="px-5 py-2 glass-card text-[9px] font-black uppercase tracking-tighter text-pink-400 border-pink-500/20 shadow-[0_0_15px_rgba(236,72,153,0.1)]">
                    OUTBOUND MONITOR v2.5
                </div>
            </div>
        </nav>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <!-- LEFT: INPUT FORM -->
            <div class="lg:col-span-7 space-y-6">
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <!-- IMAGE UPLOAD -->
                    <div class="glass-card p-6 flex flex-col">
                        <h2 class="text-[10px] font-black uppercase text-pink-400 tracking-[0.2em] mb-4 flex items-center gap-2">
                            <span class="text-lg">📸</span> Bukti Kedatangan
                        </h2>
                        <input type="file" id="fileInput" accept="image/*" class="hidden" onchange="previewImage(this)">
                        <div class="image-preview-zone flex-1 min-h-[180px] flex flex-col items-center justify-center cursor-pointer overflow-hidden" onclick="document.getElementById('fileInput').click()" id="imgContainer">
                            <div class="text-center opacity-30 group">
                                <p class="text-4xl mb-2">📥</p>
                                <p class="text-[9px] font-black uppercase tracking-widest">Klik untuk Upload</p>
                            </div>
                        </div>
                    </div>

                    <!-- MAIN INFO -->
                    <div class="glass-card p-6">
                        <h2 class="text-[10px] font-black uppercase text-pink-400 tracking-[0.2em] mb-4 flex items-center gap-2">
                            <span class="text-lg">📝</span> Detail Pengadaan
                        </h2>
                        <div class="space-y-4">
                            <div>
                                <label class="text-[9px] text-pink-200/40 uppercase font-black tracking-widest ml-1">Tanggal Inbound</label>
                                <input type="text" id="inTanggal" class="w-full p-3 text-sm mt-1 focus:ring-0">
                            </div>
                            <div>
                                <label class="text-[9px] text-pink-200/40 uppercase font-black tracking-widest ml-1">Staff Penerima</label>
                                <select id="inNama" class="w-full p-3 text-sm mt-1 focus:ring-0" onchange="generateReport()"></select>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- MATERIALS LIST -->
                <div class="glass-card p-8">
                    <div class="flex items-center gap-3 mb-8">
                        <div class="w-1 h-5 bg-pink-500 rounded-full"></div>
                        <h2 class="text-xs font-black uppercase tracking-[0.2em] text-white/90">Inventory Items (Stock In)</h2>
                    </div>
                    
                    <div class="grid grid-cols-2 sm:grid-cols-3 gap-6">
                        <!-- Items -->
                        <div class="space-y-2">
                            <label class="text-[9px] text-slate-500 font-black uppercase tracking-wider">Olahan Kentang</label>
                            <input type="number" id="mat_kentang" placeholder="0" class="w-full p-3 text-sm focus:ring-0" oninput="generateReport()">
                        </div>
                        <div class="space-y-2">
                            <label class="text-[9px] text-slate-500 font-black uppercase tracking-wider">Olahan Jeruk</label>
                            <input type="number" id="mat_jeruk" placeholder="0" class="w-full p-3 text-sm focus:ring-0" oninput="generateReport()">
                        </div>
                        <div class="space-y-2">
                            <label class="text-[9px] text-slate-500 font-black uppercase tracking-wider">Olahan Garam</label>
                            <input type="number" id="mat_garam" placeholder="0" class="w-full p-3 text-sm focus:ring-0" oninput="generateReport()">
                        </div>
                        <div class="space-y-2">
                            <label class="text-[9px] text-slate-500 font-black uppercase tracking-wider">Ikan Salmon</label>
                            <input type="number" id="mat_salmon" placeholder="0" class="w-full p-3 text-sm focus:ring-0" oninput="generateReport()">
                        </div>
                        <div class="space-y-2">
                            <label class="text-[9px] text-slate-500 font-black uppercase tracking-wider">Anggur</label>
                            <input type="number" id="mat_anggur" placeholder="0" class="w-full p-3 text-sm focus:ring-0" oninput="generateReport()">
                        </div>
                        <div class="space-y-2">
                            <label class="text-[9px] text-slate-500 font-black uppercase tracking-wider">Gula</label>
                            <input type="number" id="mat_gula" placeholder="0" class="w-full p-3 text-sm focus:ring-0" oninput="generateReport()">
                        </div>
                        <div class="space-y-2">
                            <label class="text-[9px] text-slate-500 font-black uppercase tracking-wider">Es Batu</label>
                            <input type="number" id="mat_es" placeholder="0" class="w-full p-3 text-sm focus:ring-0" oninput="generateReport()">
                        </div>
                        <div class="space-y-2">
                            <label class="text-[9px] text-slate-500 font-black uppercase tracking-wider">Minyak Bumi</label>
                            <input type="number" id="mat_minyak" placeholder="0" class="w-full p-3 text-sm focus:ring-0" oninput="generateReport()">
                        </div>
                        <div class="space-y-2">
                            <label class="text-[9px] text-pink-500 font-black uppercase tracking-wider">Susu (Special)</label>
                            <input type="number" id="mat_susu" placeholder="0" class="w-full p-3 text-sm !border-pink-500/30 focus:ring-0" oninput="generateReport()">
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mt-10 pt-8 border-t border-white/5">
                        <div class="space-y-2">
                            <label class="text-[9px] text-pink-200/40 uppercase font-black tracking-widest ml-1">Supplier / Vendor</label>
                            <input type="text" id="inSumber" value="Supplier" class="w-full p-3 text-sm focus:ring-0" oninput="generateReport()">
                        </div>
                        <div class="space-y-2">
                            <label class="text-[9px] text-pink-200/40 uppercase font-black tracking-widest ml-1">Catatan</label>
                            <textarea id="inCatatan" rows="1" placeholder="Informasi tambahan..." class="w-full p-3 text-sm focus:ring-0" oninput="generateReport()"></textarea>
                        </div>
                    </div>
                </div>
            </div>

            <!-- RIGHT: PREVIEW -->
            <div class="lg:col-span-5">
                <div class="glass-card p-8 sticky top-8 flex flex-col h-full border-t-4 border-pink-600">
                    <div class="mb-6 flex items-center justify-between">
                        <div>
                            <h3 class="text-xs font-black text-white tracking-[0.2em] uppercase">Transmission Preview</h3>
                            <p class="text-[9px] text-pink-400 font-bold uppercase">Format Laporan Discord</p>
                        </div>
                        <button onclick="copyReport()" class="btn-primary px-5 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest text-white">Salin</button>
                    </div>

                    <div id="reportPreview" class="bg-black/40 p-6 rounded-2xl border border-white/5 font-mono text-[11px] leading-relaxed whitespace-pre-wrap overflow-y-auto min-h-[380px] text-pink-50/70">...</div>

                    <button id="btnSendDiscord" onclick="sendToDiscord()" class="w-full mt-6 py-4 rounded-xl text-[10px] font-black uppercase tracking-[0.2em] flex items-center justify-center gap-3 text-white bg-[#5865F2] hover:bg-[#4752c4] transition-all active:scale-95 shadow-lg shadow-indigo-500/20">
                        <span>🚀</span> Broadcast to Discord
                    </button>

                    <button onclick="resetInputs()" class="mt-8 text-[9px] text-white/10 hover:text-pink-500 uppercase font-black tracking-[0.3em] transition-all self-center">
                        Clear All Data
                    </button>
                </div>
            </div>
        </div>
    </div>

    <footer class="mt-20 text-center text-white/10 text-[9px] uppercase tracking-[0.4em] font-black">
        Kiramitsu Internal System • secure environment • v2.5
    </footer>

    <script>
        const DISCORD_WEBHOOK_URL = "https://discord.com/api/webhooks/1486790436914856108/_zO-ec3G0DHyh-K8JV87eMqSAulBx71VOx49kYGl89S_05KHmB8-A5RwyVZvIJ1FytSo";
        
        const STAFF_DATA = [
            { nama: "Gison Kiramitsu", jabatan: "Ceo" },
            { nama: "Valish Kiramitsu", jabatan: "Manager" },
            { nama: "Nuel Zaverio", jabatan: "HRD" },
            { nama: "Tam Kiramitsu", jabatan: "HRD" },
            { nama: "Bell Kiramitsu", jabatan: "HRD" },
            { nama: "Arsan Kiramitsu", jabatan: "HRD" },
            { nama: "Boru Octarine", jabatan: "Bartender" },
            { nama: "Davis Lame", jabatan: "Bartender" },
            { nama: "Fang Yin", jabatan: "Bartender" },
            { nama: "Alex Kiramitsu", jabatan: "Waiters" },
            { nama: "Devano Fortuna", jabatan: "Waiters" },
            { nama: "Rider Alkhareem", jabatan: "Guard" },
            { nama: "Farah Dominion", jabatan: "Dancer" }
        ];

        let selectedFile = null;

        function populateStaff() {
            const select = document.getElementById('inNama');
            STAFF_DATA.sort((a,b) => a.nama.localeCompare(b.nama)).forEach(staff => {
                const opt = document.createElement('option');
                opt.value = staff.nama.toUpperCase();
                opt.innerText = `${staff.nama} (${staff.jabatan})`;
                select.appendChild(opt);
            });
        }

        function previewImage(input) {
            const file = input.files[0];
            if (file) {
                selectedFile = file;
                const reader = new FileReader();
                reader.onload = function(e) {
                    const container = document.getElementById('imgContainer');
                    container.innerHTML = `<img src="${e.target.result}" class="w-full h-full object-cover animate-in fade-in duration-500" alt="Preview">`;
                }
                reader.readAsDataURL(file);
            }
        }

        function generateReport() {
            const tgl = document.getElementById('inTanggal').value || '--/--/----';
            const nama = document.getElementById('inNama').value;
            const sumber = document.getElementById('inSumber').value || 'Supplier';
            const catatan = document.getElementById('inCatatan').value || '-';

            const materials = [
                { id: 'mat_kentang', label: 'Olahan Kentang' },
                { id: 'mat_jeruk', label: 'Olahan Jeruk' },
                { id: 'mat_garam', label: 'Olahan Garam' },
                { id: 'mat_salmon', label: 'Ikan Salmon' },
                { id: 'mat_anggur', label: 'Anggur' },
                { id: 'mat_gula', label: 'Gula' },
                { id: 'mat_es', label: 'Es Batu' },
                { id: 'mat_minyak', label: 'Minyak Bumi' },
                { id: 'mat_susu', label: 'Susu' }
            ];

            let report = "```\n";
            report += `┏━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┓\n`;
            report += `       LAPORAN MASUK BAHAN BAKU\n`;
            report += `┗━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┛\n`;
            report += `📅 Tanggal : ${tgl.toUpperCase()}\n`;
            report += `👤 Nama    : ${nama}\n`;
            report += `🚚 Sumber  : [${sumber}]\n\n`;
            report += `📦 [ DAFTAR BAHAN MASUK ]\n`;

            let hasData = false;
            materials.forEach(m => {
                const val = document.getElementById(m.id).value;
                if (val && parseInt(val) > 0) {
                    report += `• ${m.label.padEnd(16)} : ${val} PC\n`;
                    hasData = true;
                }
            });

            if(!hasData) report += `  ( Belum ada daftar bahan masuk )\n`;

            report += `\n📝 CATATAN:\n- ${catatan}\n\n`;
            report += `✅ STATUS: [ ✔ ] Sudah Masuk Kulkas [ ✔ ] Siap Diolah\n`;
            report += `━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n`;
            report += "```";

            document.getElementById('reportPreview').innerText = report;
        }

        async function sendToDiscord() {
            const reportText = document.getElementById('reportPreview').innerText;
            const btn = document.getElementById('btnSendDiscord');
            
            try {
                btn.disabled = true;
                btn.innerHTML = `<span>⏳</span> PROCESSING...`;

                const formData = new FormData();
                formData.append('content', reportText);
                
                if (selectedFile) {
                    formData.append('file', selectedFile);
                }

                const response = await fetch(DISCORD_WEBHOOK_URL, {
                    method: 'POST',
                    body: formData
                });

                if (response.ok) {
                    btn.innerText = "✅ DATA SENT!";
                    btn.style.backgroundColor = "#16a34a";
                    setTimeout(() => {
                        btn.innerText = "🚀 Broadcast to Discord";
                        btn.style.backgroundColor = "";
                        btn.disabled = false;
                    }, 3000);
                }
            } catch (error) {
                btn.disabled = false;
                btn.innerText = "❌ ERROR SENDING";
                setTimeout(() => {
                    btn.innerText = "🚀 Broadcast to Discord";
                }, 3000);
            }
        }

        function copyReport() {
            const text = document.getElementById('reportPreview').innerText;
            const el = document.createElement('textarea');
            el.value = text;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            
            const btn = document.querySelector('.btn-primary');
            const originalText = btn.innerText;
            btn.innerText = "COPIED!";
            setTimeout(() => btn.innerText = originalText, 2000);
        }

        function resetInputs() {
            if(confirm("Hapus semua input data?")) {
                document.querySelectorAll('input[type="number"]').forEach(i => i.value = "");
                document.getElementById('inCatatan').value = "";
                document.getElementById('fileInput').value = "";
                selectedFile = null;
                document.getElementById('imgContainer').innerHTML = `
                    <div class="text-center opacity-30 group">
                        <p class="text-4xl mb-2">📥</p>
                        <p class="text-[9px] font-black uppercase tracking-widest">Klik untuk Upload</p>
                    </div>`;
                generateReport();
            }
        }

        window.onload = () => {
            populateStaff();
            const today = new Date();
            const months = ["JANUARI", "FEBRUARI", "MARET", "APRIL", "MEI", "JUNI", "JULI", "AGUSTUS", "SEPTEMBER", "OKTOBER", "NOVEMBER", "DESEMBER"];
            const dateStr = today.getDate() + ' ' + months[today.getMonth()] + ' ' + today.getFullYear();
            document.getElementById('inTanggal').value = dateStr;
            generateReport();
        };
    </script>
</body>
</html>
