<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kiramitsu Sales Dashboard - Management System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { 
            background: radial-gradient(circle at top right, #2d1b2e, #0f172a); 
            color: #f8fafc; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            min-height: screen;
        }
        
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(244, 114, 182, 0.1);
        }

        .input-field {
            background: rgba(15, 23, 42, 0.6) !important;
            border: 1px solid rgba(244, 114, 182, 0.2) !important;
            color: white !important;
            transition: all 0.3s ease;
        }

        .input-field:focus {
            border-color: #f472b6 !important;
            box-shadow: 0 0 10px rgba(244, 114, 182, 0.2);
            outline: none;
        }

        .btn-discord {
            background: linear-gradient(135deg, #5865F2 0%, #4752c4 100%);
            box-shadow: 0 4px 15px rgba(88, 101, 242, 0.3);
            transition: all 0.3s;
        }

        .btn-discord:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(88, 101, 242, 0.5);
            filter: brightness(1.1);
        }

        .logo-container {
            filter: drop-shadow(0 0 10px rgba(244, 114, 182, 0.3));
        }

        ::-webkit-calendar-picker-indicator { filter: invert(1) sepia(100%) saturate(1000%) hue-rotate(300deg); }

        .report-preview {
            background: rgba(0, 0, 0, 0.4);
            font-family: 'Courier New', Courier, monospace;
            scrollbar-width: thin;
            scrollbar-color: #f472b6 rgba(0,0,0,0);
        }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-5xl mx-auto">
        
        <!-- HEADER WITH LOGO -->
        <header class="mb-10 flex flex-col md:flex-row justify-between items-center md:items-end gap-6">
            <div class="flex items-center gap-4">
                <div class="logo-container">
                    <!-- GANTI SRC DIBAWAH INI DENGAN FILE .JPG BAPAK -->
                    <img src="kiramitsu.png" alt="Logo" onerror="this.src='https://ui-avatars.com/api/?name=K&background=ec4899&color=fff'" class="w-16 h-16 rounded-full border-2 border-pink-500/30 p-1 object-cover">
                </div>
                <div>
                    <h1 class="text-3xl font-black text-white italic tracking-tighter">KIRA<span class="text-pink-500">MITSU</span></h1>
                    <p class="text-pink-200/50 text-[10px] uppercase font-bold tracking-[0.3em]">Sales Dashboard & Calculator</p>
                    <a href="index.html" class="text-pink-500 text-[10px] font-black uppercase tracking-widest hover:text-white transition-colors mt-1 inline-block">← Back to Menu</a>
                </div>
            </div>
            
            <div class="text-center md:text-right border-l-2 md:border-l-0 md:border-r-2 border-pink-500/30 px-4">
                <p id="headerNameDisplay" class="font-bold text-slate-100 uppercase tracking-tight text-lg">Nuel Zaverio</p>
                <p id="headerJobDisplay" class="text-[10px] text-pink-500 uppercase font-black tracking-[0.2em]">HRD • DAILY REPORT SYSTEM</p>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            
            <!-- INPUT SECTION (Left) -->
            <div class="lg:col-span-7 space-y-6">
                <div class="glass-card p-6 rounded-3xl shadow-xl">
                    <h2 class="text-sm font-black mb-6 text-pink-400 uppercase tracking-[0.2em] flex items-center gap-3">
                        <span class="p-2 bg-pink-500/10 rounded-lg">✍️</span> Input Penjualan
                    </h2>
                    
                    <div class="space-y-6">
                        <!-- Admin Info -->
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div class="space-y-1">
                                <label class="text-[9px] text-pink-200/40 uppercase font-black ml-1">Nama Kasir</label>
                                <select id="kasirInput" class="w-full p-3 rounded-xl text-sm input-field outline-none" onchange="handleStaffChange()">
                                    <!-- Dinamis dari JS -->
                                </select>
                            </div>
                            <div class="space-y-1">
                                <label class="text-[9px] text-pink-200/40 uppercase font-black ml-1">Jabatan</label>
                                <input type="text" id="jabatanInput" class="w-full p-3 rounded-xl text-sm input-field opacity-60 cursor-not-allowed" readonly>
                            </div>
                        </div>

                        <div class="grid grid-cols-2 gap-4">
                            <div class="space-y-1">
                                <label class="text-[9px] text-pink-200/40 uppercase font-black ml-1">Tanggal</label>
                                <input type="date" id="dateInput" class="w-full p-3 rounded-xl text-sm input-field">
                            </div>
                            <div class="space-y-1">
                                <label class="text-[9px] text-pink-200/40 uppercase font-black ml-1">Jam Closing</label>
                                <input type="text" id="timeInput" placeholder="05:00 WIB" class="w-full p-3 rounded-xl text-sm input-field">
                            </div>
                        </div>

                        <!-- Product Grid -->
                        <div class="pt-4 border-t border-white/5">
                            <p class="text-[10px] font-black text-pink-500/50 uppercase tracking-widest mb-4">Inventory & Services</p>
                            <div class="grid grid-cols-2 md:grid-cols-3 gap-4">
                                <div class="bg-white/5 p-3 rounded-2xl border border-white/5">
                                    <label class="block text-[9px] text-slate-400 uppercase font-bold mb-2">P. Amer (65k)</label>
                                    <input type="number" id="qAmer" value="0" min="0" class="w-full bg-transparent text-white font-bold outline-none sales-qty text-center text-lg">
                                </div>
                                <div class="bg-white/5 p-3 rounded-2xl border border-white/5">
                                    <label class="block text-[9px] text-slate-400 uppercase font-bold mb-2">P. Vodka (85k)</label>
                                    <input type="number" id="qVodka" value="0" min="0" class="w-full bg-transparent text-white font-bold outline-none sales-qty text-center text-lg">
                                </div>
                                <div class="bg-white/5 p-3 rounded-2xl border border-white/5">
                                    <label class="block text-[9px] text-slate-400 uppercase font-bold mb-2">P. Azul (105k)</label>
                                    <input type="number" id="qAzul" value="0" min="0" class="w-full bg-transparent text-white font-bold outline-none sales-qty text-center text-lg">
                                </div>
                                <div class="bg-white/5 p-3 rounded-2xl border border-white/5">
                                    <label class="block text-[9px] text-slate-400 uppercase font-bold mb-2">F. Fries (60k)</label>
                                    <input type="number" id="qFries" value="0" min="0" class="w-full bg-transparent text-white font-bold outline-none sales-qty text-center text-lg">
                                </div>
                                <div class="bg-white/5 p-3 rounded-2xl border border-white/5">
                                    <label class="block text-[9px] text-slate-400 uppercase font-bold mb-2">F. Chips (70k)</label>
                                    <input type="number" id="qChips" value="0" min="0" class="w-full bg-transparent text-white font-bold outline-none sales-qty text-center text-lg">
                                </div>
                                <div class="bg-white/5 p-3 rounded-2xl border border-white/5">
                                    <label class="block text-[9px] text-slate-400 uppercase font-bold mb-2">Rokok (50k)</label>
                                    <input type="number" id="qRokok" value="0" min="0" class="w-full bg-transparent text-white font-bold outline-none sales-qty text-center text-lg">
                                </div>
                            </div>
                        </div>

                        <div class="grid grid-cols-2 gap-4">
                            <div class="bg-pink-500/5 p-4 rounded-2xl border border-pink-500/10">
                                <label class="block text-[9px] text-pink-400 uppercase font-black mb-2 tracking-tighter">VIP Basic (1.5jt)</label>
                                <input type="number" id="qVipBasic" value="0" min="0" class="w-full bg-transparent text-white font-black outline-none sales-qty text-xl">
                            </div>
                            <div class="bg-pink-500/5 p-4 rounded-2xl border border-pink-500/10">
                                <label class="block text-[9px] text-pink-400 uppercase font-black mb-2 tracking-tighter">VIP Tema (2.5jt)</label>
                                <input type="number" id="qVipTema" value="0" min="0" class="w-full bg-transparent text-white font-black outline-none sales-qty text-xl">
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- RESULT SECTION (Right) -->
            <div class="lg:col-span-5 flex flex-col gap-6">
                <div class="glass-card p-6 rounded-3xl flex-grow flex flex-col border-t-4 border-t-pink-500 shadow-2xl">
                    <div class="flex justify-between items-center mb-4">
                        <h2 class="text-xs font-black text-pink-200 uppercase tracking-widest flex items-center gap-2">
                            <span>📄</span> LIVE PREVIEW
                        </h2>
                        <button onclick="copyToClipboard()" class="text-[9px] bg-white/10 px-3 py-1.5 rounded-lg uppercase font-black hover:bg-pink-500 transition-colors">Copy Text</button>
                    </div>

                    <div id="reportText" class="report-preview flex-grow p-4 rounded-2xl border border-white/5 text-[10px] text-pink-100/90 whitespace-pre overflow-y-auto leading-relaxed mb-6 min-h-[350px]">
                        Silakan lengkapi data...
                    </div>

                    <div class="space-y-4 mt-auto">
                        <div class="bg-pink-500/20 p-4 rounded-2xl border border-pink-500/30 flex justify-between items-center">
                            <span class="text-[10px] font-black text-pink-300 uppercase">Grand Total Revenue</span>
                            <span id="grandTotalLabel" class="text-xl font-black text-white">Rp 0</span>
                        </div>
                        
                        <button id="btnSendDiscord" onclick="sendToDiscord()" class="btn-discord w-full py-4 rounded-2xl font-black uppercase tracking-[0.2em] text-white flex items-center justify-center gap-3">
                            <span>🚀</span> SEND TO DISCORD
                        </button>
                        
                        <button onclick="resetForm()" class="w-full text-pink-100/30 text-[9px] font-black uppercase tracking-widest hover:text-pink-500 transition-colors">Reset All Inputs</button>
                    </div>
                </div>
            </div>
        </div>
        
        <footer class="mt-12 text-center text-white/20 text-[9px] uppercase tracking-[0.4em] font-black">
            Kiramitsu Internal System • secure environment • v2.5
        </footer>
    </div>

    <script>
        const DISCORD_WEBHOOK_URL = "https://discord.com/api/webhooks/1486790421832007821/68g2tjs4FeDKiEJXyeh3W67sNs9zBNFpt8XBxV_E20Fe-HLqGZqtAmqbUULzPrFnyVzP";

        const STAFF_DATA = [
            { nama: "Gison Kiramitsu", jabatan: "Ceo" },
            { nama: "Valish Kiramitsu", jabatan: "Manager" },
            { nama: "Nuel Zaverio", jabatan: "HRD" },
            { nama: "Tam Kiramitsu", jabatan: "HRD"},
            { nama: "Bell Kiramitsu", jabatan: "HRD"},
            { nama: "Arsan Kiramitsu", jabatan: "HRD"},
            { nama: "Boru Octarine", jabatan: "Bartender"},
            { nama: "Davis Lame", jabatan: "Bartender"},
            { nama: "Fang Yin", jabatan: "Bartender"},
            { nama: "Alex Kiramitsu", jabatan: "Waiters"},
            { nama: "Devano Fortuna", jabatan: "Waiters"},
            { nama: "Rider Alkhareem", jabatan: "Guard"},
            { nama: "Farah Dominion", jabatan: "Dancer"}
        ];

        const PRICES = {
            amer: 65000,
            vodka: 85000,
            azul: 105000,
            fries: 60000,
            chips: 70000,
            rokok: 50000,
            vipBasic: 1500000,
            vipTema: 2500000
        };

        function formatIDR(num) {
            return new Intl.NumberFormat('id-ID', { 
                style: 'currency', 
                currency: 'IDR', 
                maximumFractionDigits: 0 
            }).format(num);
        }

        function initStaff() {
            const select = document.getElementById('kasirInput');
            select.innerHTML = "";
            STAFF_DATA.forEach(staff => {
                const opt = document.createElement('option');
                opt.value = staff.nama;
                opt.textContent = staff.nama;
                select.appendChild(opt);
            });
            select.value = "Nuel Zaverio";
            handleStaffChange();
        }

        function handleStaffChange() {
            const select = document.getElementById('kasirInput');
            const jab = document.getElementById('jabatanInput');
            const hName = document.getElementById('headerNameDisplay');
            const hJob = document.getElementById('headerJobDisplay');
            
            const staff = STAFF_DATA.find(s => s.nama === select.value);
            if (staff) {
                jab.value = staff.jabatan;
                hName.innerText = staff.nama;
                hJob.innerText = staff.jabatan.toUpperCase() + " • DAILY REPORT SYSTEM";
            }
            generateReport();
        }

        function generateReport() {
            const kasirName = document.getElementById('kasirInput').value || '---';
            const jabatan = document.getElementById('jabatanInput').value || '---';
            const dateVal = document.getElementById('dateInput').value || '---';
            const timeVal = document.getElementById('timeInput').value || '--:-- WIB';
            
            const qA = parseInt(document.getElementById('qAmer').value) || 0;
            const qV = parseInt(document.getElementById('qVodka').value) || 0;
            const qAz = parseInt(document.getElementById('qAzul').value) || 0;
            const qR = parseInt(document.getElementById('qRokok').value) || 0;
            const qF = parseInt(document.getElementById('qFries').value) || 0;
            const qC = parseInt(document.getElementById('qChips').value) || 0;
            const qVb = parseInt(document.getElementById('qVipBasic').value) || 0;
            const qVt = parseInt(document.getElementById('qVipTema').value) || 0;

            const total = (qA * PRICES.amer) + (qV * PRICES.vodka) + (qAz * PRICES.azul) + 
                          (qR * PRICES.rokok) + (qF * PRICES.fries) + (qC * PRICES.chips) + 
                          (qVb * PRICES.vipBasic) + (qVt * PRICES.vipTema);

            document.getElementById('grandTotalLabel').innerText = formatIDR(total);

            const report = `┏━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┓
      𝑲𝑰𝑹𝑨𝑴𝑰𝑻𝑺𝑼 𝑫𝑨𝑰𝑳𝑹𝑬𝑷𝑶𝑹𝑻 (𝑪𝑳𝑶𝑺𝑰𝑵𝑮)
┗━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┛
📅 Periode   : ${dateVal}
⏰ Closing   : ${timeVal}
👤 Kasir     : ${kasirName} (${jabatan})

🍸 [ SIGNATURE PACKAGES ]
• Paket Amer        : ${qA} PC  (${formatIDR(qA * PRICES.amer)})
• Paket Vodka       : ${qV} PC  (${formatIDR(qV * PRICES.vodka)})
• Paket Azul        : ${qAz} PC  (${formatIDR(qAz * PRICES.azul)})

🍽️ [ DINING & EXTRA ]
• Pkt French Fries  : ${qF} PC  (${formatIDR(qF * PRICES.fries)})
• Pkt Fish & Chips  : ${qC} PC  (${formatIDR(qC * PRICES.chips)})
• Rokok & Korek     : ${qR} PC  (${formatIDR(qR * PRICES.rokok)})

🏨 [ ROOM BOOKING ]
• VIP Room Basic    : ${qVb} Room (${formatIDR(qVb * PRICES.vipBasic)})
• VIP Room Tema     : ${qVt} Room (${formatIDR(qVt * PRICES.vipTema)})

━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
💰 TOTAL REVENUE    : ${formatIDR(total)}
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━`;

            document.getElementById('reportText').innerText = report;
        }

        async function sendToDiscord() {
            const reportText = document.getElementById('reportText').innerText;
            const btn = document.getElementById('btnSendDiscord');
            
            if (reportText.includes("Silakan lengkapi")) return;

            try {
                btn.disabled = true;
                btn.innerHTML = `<span>⏳</span> MENGIRIM...`;

                const response = await fetch(DISCORD_WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ content: "```" + reportText.replace(/```/g, "") + "```" })
                });

                if (response.ok) {
                    btn.innerHTML = `<span>✅</span> BERHASIL!`;
                    btn.style.background = "#16a34a";
                    setTimeout(() => {
                        btn.innerHTML = `<span>🚀</span> SEND TO DISCORD`;
                        btn.style.background = "";
                        btn.disabled = false;
                    }, 3000);
                } else {
                    throw new Error("Gagal kirim");
                }
            } catch (error) {
                alert("Kesalahan: Webhook Discord bermasalah.");
                btn.disabled = false;
                btn.innerHTML = `<span>🚀</span> SEND TO DISCORD`;
            }
        }

        function copyToClipboard() {
            const text = document.getElementById('reportText').innerText;
            const el = document.createElement('textarea');
            el.value = text;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            alert("Teks Laporan Berhasil Disalin!");
        }

        function resetForm() {
            if(confirm("Hapus semua data input?")) {
                document.querySelectorAll('.sales-qty').forEach(el => el.value = 0);
                document.getElementById('timeInput').value = "";
                generateReport();
            }
        }

        document.querySelectorAll('input, select').forEach(el => {
            el.addEventListener('input', generateReport);
        });

        window.onload = () => {
            const now = new Date();
            document.getElementById('dateInput').valueAsDate = now;
            initStaff();
        };
    </script>
</body>
</html>
