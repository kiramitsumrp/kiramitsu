<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kiramitsu - Laporan Barang Olahan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent-pink: #f472b6;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(244, 114, 182, 0.1);
        }

        body { 
            background: radial-gradient(circle at top right, #2d1b2e, #0f172a); 
            color: #f8fafc; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Latar Belakang Animasi dari Index */
        .animated-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            opacity: 0.4;
            background: 
                radial-gradient(circle at 20% 30%, #db2777 0%, transparent 25%),
                radial-gradient(circle at 80% 70%, #9d174d 0%, transparent 25%);
            filter: blur(80px);
        }

        /* Glassmorphism Card (Sesuai Index) */
        .glass-card { 
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .glass-card:hover {
            background: rgba(244, 114, 182, 0.05);
            border-color: rgba(244, 114, 182, 0.4);
            box-shadow: 0 20px 40px -15px rgba(244, 114, 182, 0.2);
        }

        /* Input Styling agar Matching */
        input, select, textarea { 
            background: rgba(15, 23, 42, 0.4) !important; 
            border: 1px solid rgba(255, 255, 255, 0.1) !important; 
            color: white !important; 
            font-size: 0.875rem !important; 
            padding: 0.75rem !important; 
            width: 100%;
            border-radius: 14px;
            transition: all 0.3s ease;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--accent-pink) !important;
            background: rgba(244, 114, 182, 0.05) !important;
            box-shadow: 0 0 15px rgba(244, 114, 182, 0.2);
        }

        /* Button Gradient (Sesuai nuansa Index) */
        .btn-pink { 
            background: linear-gradient(135deg, #ec4899 0%, #be185d 100%);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 15px rgba(236, 72, 153, 0.3);
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }
        .btn-pink:hover { 
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(236, 72, 153, 0.5);
            filter: brightness(1.1);
        }

        .image-preview-box {
            width: 100%;
            height: 160px;
            border: 2px dashed rgba(244, 114, 182, 0.3);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.02);
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .image-preview-box:hover {
            border-color: var(--accent-pink);
            background: rgba(244, 114, 182, 0.05);
        }

        /* Label Styling */
        .field-label {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            font-weight: 800;
            color: rgba(244, 114, 182, 0.6);
            margin-bottom: 0.5rem;
            display: block;
        }

        .logo-glow {
            text-shadow: 0 0 20px rgba(244, 114, 182, 0.5);
        }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: rgba(244, 114, 182, 0.2); border-radius: 10px; }
    </style>
</head>
<body class="p-4 md:p-10 flex flex-col items-center">

    <div class="animated-bg"></div>

    <div class="w-full max-w-6xl">
        <!-- HEADER SAMA DENGAN NUANSA INDEX -->
        <header class="flex flex-col md:flex-row md:items-center justify-between gap-6 mb-12">
            <div class="flex items-center gap-5">
                <div class="p-1 glass-card border-pink-500/30 rounded-full">
                    <img src="kiramitsu.png" alt="Logo" onerror="this.src='https://ui-avatars.com/api/?name=K&background=ec4899&color=fff'" class="w-14 h-14 rounded-full object-cover">
                </div>
                <div>
                    <h1 class="text-3xl font-black italic tracking-tighter uppercase leading-none logo-glow">
                        Kira<span class="text-pink-500">mitsu</span>
                    </h1>
                    <p class="text-[9px] uppercase tracking-[0.4em] font-bold text-pink-400/60 mt-1">Infrastructure Terminal</p>
                </div>
            </div>
            <div class="flex items-center gap-6">
                <a href="index.html" class="text-[10px] font-black uppercase tracking-widest text-slate-400 hover:text-pink-400 transition-all flex items-center gap-2">
                    <span class="text-lg">←</span> Back to Dashboard
                </a>
                <div class="h-10 w-[1px] bg-white/10"></div>
                <div class="px-5 py-2 glass-card text-[9px] font-black uppercase tracking-tighter text-pink-400 border-pink-500/20 shadow-[0_0_15px_rgba(236,72,153,0.1)]">
                    OUTBOUND MONITOR v2.5
                </div>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <!-- LEFT COLUMN: INPUTS -->
            <div class="lg:col-span-7 space-y-6">
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <!-- PHOTO SECTION -->
                    <div class="glass-card p-6 flex flex-col justify-between">
                        <div>
                            <span class="field-label">Evidence</span>
                            <h2 class="text-lg font-bold mb-4 text-white">Bukti Foto</h2>
                        </div>
                        <input type="file" id="fileInput" accept="image/*" class="hidden" onchange="previewImage(this)">
                        <div class="image-preview-box" onclick="document.getElementById('fileInput').click()" id="imgContainer">
                            <div class="text-center opacity-40">
                                <p class="text-3xl mb-2">📸</p>
                                <p class="text-[8px] font-black uppercase tracking-[0.2em]">Upload Image</p>
                            </div>
                        </div>
                    </div>

                    <!-- OFFICER INFO -->
                    <div class="glass-card p-6 space-y-5">
                        <div>
                            <span class="field-label">Main Information</span>
                            <h2 class="text-lg font-bold text-white">Data Pengambil</h2>
                        </div>
                        <div>
                            <label class="field-label">Tanggal</label>
                            <input type="text" id="inTanggal" placeholder="DD/MM/YYYY" oninput="generateReport()">
                        </div>
                        <div>
                            <label class="field-label">Petugas Lapangan</label>
                            <select id="inNama" onchange="generateReport()">
                                <!-- Populated by JS -->
                            </select>
                        </div>
                    </div>
                </div>

                <!-- PURPOSE & NOTES -->
                <div class="glass-card p-6 space-y-4">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label class="field-label">Tujuan Pengambilan</label>
                            <select id="inTujuan" onchange="generateReport()">
                                <option value="Produksi Paket / Restock Bar">Produksi Paket / Restock Bar</option>
                                <option value="Event Khusus">Event Khusus</option>
                                <option value="Afkir / Rusak">Afkir / Rusak</option>
                                <option value="Lainnya">Lainnya</option>
                            </select>
                        </div>
                        <div>
                            <label class="field-label">Catatan Tambahan</label>
                            <textarea id="inCatatan" rows="1" placeholder="Catatan tambahan..." oninput="generateReport()"></textarea>
                        </div>
                    </div>
                </div>

                <!-- QUANTITY GRID -->
                <div class="glass-card p-8">
                    <div class="flex items-center gap-3 mb-8">
                        <div class="w-1.5 h-6 bg-pink-500 rounded-full shadow-[0_0_10px_#ec4899]"></div>
                        <h2 class="text-xs font-black uppercase tracking-[0.3em] text-pink-100/80">Inventory Outbound List</h2>
                    </div>
                    <div class="grid grid-cols-2 sm:grid-cols-4 gap-5">
                        <div class="space-y-1">
                            <label class="field-label">Kentang</label>
                            <input type="number" id="mat_kentang" placeholder="0" oninput="generateReport()">
                        </div>
                        <div class="space-y-1">
                            <label class="field-label">Jeruk</label>
                            <input type="number" id="mat_jeruk" placeholder="0" oninput="generateReport()">
                        </div>
                        <div class="space-y-1">
                            <label class="field-label">Garam</label>
                            <input type="number" id="mat_garam" placeholder="0" oninput="generateReport()">
                        </div>
                        <div class="space-y-1">
                            <label class="field-label">Salmon</label>
                            <input type="number" id="mat_salmon" placeholder="0" oninput="generateReport()">
                        </div>
                        <div class="space-y-1">
                            <label class="field-label">Anggur</label>
                            <input type="number" id="mat_anggur" placeholder="0" oninput="generateReport()">
                        </div>
                        <div class="space-y-1">
                            <label class="field-label">Gula</label>
                            <input type="number" id="mat_gula" placeholder="0" oninput="generateReport()">
                        </div>
                        <div class="space-y-1">
                            <label class="field-label">Es Batu</label>
                            <input type="number" id="mat_es" placeholder="0" oninput="generateReport()">
                        </div>
                        <div class="space-y-1">
                            <label class="field-label">Minyak Bumi</label>
                            <input type="number" id="mat_minyak" placeholder="0" oninput="generateReport()">
                        </div>
                    </div>
                </div>
            </div>

            <!-- RIGHT COLUMN: PREVIEW (Sesuai nuansa Index) -->
            <div class="lg:col-span-5">
                <div class="glass-card p-8 sticky top-10 flex flex-col gap-8 h-fit border-t-4 border-t-pink-500/50">
                    <div class="flex justify-between items-end">
                        <div>
                            <h2 class="text-3xl font-black italic tracking-tighter">DATA<span class="text-pink-500">.</span></h2>
                            <p class="text-[9px] text-pink-400/80 font-bold tracking-[0.3em] uppercase">Ready for distribution</p>
                        </div>
                        <button onclick="copyReport()" class="btn-pink px-6 py-2.5 rounded-full text-[9px]">
                            Copy Teks
                        </button>
                    </div>

                    <div id="reportPreview" class="bg-black/40 backdrop-blur-md p-6 rounded-2xl border border-pink-500/10 font-mono text-[11px] leading-relaxed whitespace-pre-wrap overflow-y-auto min-h-[380px] text-pink-50/90 shadow-inner">
                        Menunggu input data...
                    </div>

                    <div class="space-y-4">
                        <button id="btnSendDiscord" onclick="sendToDiscord()" class="btn-pink w-full py-5 rounded-2xl text-[11px] font-black uppercase tracking-[0.3em] flex items-center justify-center gap-3">
                            <span>🚀</span> Transmit to Discord
                        </button>
                        <button onclick="resetInputs()" class="w-full py-2 text-[9px] text-white/30 hover:text-pink-400 uppercase font-black tracking-[0.3em] transition-all">
                            Clear System Memory
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- NOTIFIKASI SAMA DENGAN NUANSA INDEX -->
    <div id="toast" class="fixed bottom-10 right-10 transform translate-y-20 opacity-0 transition-all duration-500 glass-card px-8 py-4 border-pink-500/40 flex items-center gap-4 shadow-[0_10px_40px_rgba(236,72,153,0.3)]">
        <span id="toastIcon" class="text-xl">✅</span>
        <span id="toastMsg" class="text-[10px] font-black uppercase tracking-widest text-white">Berhasil!</span>
    </div>

     <footer class="mt-12 text-center text-white/20 text-[9px] uppercase tracking-[0.4em] font-black">
            Kiramitsu Internal System • secure environment • v2.5
        </footer>
        
    <script>
        const DISCORD_WEBHOOK_URL = "https://discord.com/api/webhooks/1486790436914856108/_zO-ec3G0DHyh-K8JV87eMqSAulBx71VOx49kYGl89S_05KHmB8-A5RwyVZvIJ1FytSo";
        
        const STAFF_DATA = [
            { nama: "Gison Kiramitsu", jabatan: "CEO" },
            { nama: "Valish Kiramitsu", jabatan: "Manager" },
            { nama: "Nuel Zaverio", jabatan: "HRD" },
            { nama: "Tam Kiramitsu", jabatan: "HRD" },
            { nama: "Bell Kiramitsu", jabatan: "HRD" },
            { nama: "Arsan Kiramitsu", jabatan: "HRD" },
            { nama: "Boru Octarine", jabatan: "Bartender" },
            { nama: "Davis Lame", jabatan: "Bartender" },
            { nama: "Fang Yin", jabatan: "Bartender" },
            { nama: "Alex Kiramitsu", jabatan: "Waiters" },
            { nama: "Devano Fortuna", jabatan: "Waiters" },
            { nama: "Rider Alkhareem", jabatan: "Guard" },
            { nama: "Farah Dominion", jabatan: "Dancer" }
        ];

        let selectedFile = null;

        function populateStaff() {
            const select = document.getElementById('inNama');
            STAFF_DATA.forEach(staff => {
                const opt = document.createElement('option');
                opt.value = `${staff.nama}|${staff.jabatan}`;
                opt.innerText = `${staff.nama} (${staff.jabatan})`;
                select.appendChild(opt);
            });
        }

        function showToast(msg, icon = "✅") {
            const toast = document.getElementById('toast');
            document.getElementById('toastMsg').innerText = msg;
            document.getElementById('toastIcon').innerText = icon;
            toast.classList.remove('translate-y-20', 'opacity-0');
            setTimeout(() => {
                toast.classList.add('translate-y-20', 'opacity-0');
            }, 3000);
        }

        function previewImage(input) {
            const file = input.files[0];
            if (file) {
                selectedFile = file;
                const reader = new FileReader();
                reader.onload = function(e) {
                    const container = document.getElementById('imgContainer');
                    container.innerHTML = `<img src="${e.target.result}" alt="Preview" class="w-full h-full object-cover">`;
                    generateReport();
                }
                reader.readAsDataURL(file);
            }
        }

        function generateReport() {
            const tgl = document.getElementById('inTanggal').value || '--/--/----';
            const staffVal = document.getElementById('inNama').value;
            const [nama, jabatan] = staffVal.split('|');
            const tujuan = document.getElementById('inTujuan').value;
            const catatan = document.getElementById('inCatatan').value || '-';

            const materials = [
                { id: 'mat_kentang', label: 'Olahan Kentang' },
                { id: 'mat_jeruk', label: 'Olahan Jeruk' },
                { id: 'mat_garam', label: 'Olahan Garam' },
                { id: 'mat_salmon', label: 'Ikan Salmon' },
                { id: 'mat_anggur', label: 'Anggur' },
                { id: 'mat_gula', label: 'Gula' },
                { id: 'mat_es', label: 'Es Batu' },
                { id: 'mat_minyak', label: 'Minyak Bumi' }
            ];

            let report = "```\n";
            report += `┏━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┓\n`;
            report += `        LAPORAN KELUAR BARANG OLAHAN\n`;
            report += `        KIRAMITSU RESTAURANT & BAR\n`;
            report += `┗━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┛\n`;
            report += `📅 Tanggal  : ${tgl}\n`;
            report += `👤 Petugas  : ${nama}\n`;
            report += `💼 Jabatan  : ${jabatan}\n`;
            report += `📥 Tujuan   : [ ${tujuan} ]\n`;
            report += `━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n\n`;
            report += `📦 [ RINCIAN BARANG KELUAR ]\n`;

            let hasData = false;
            materials.forEach(m => {
                const val = document.getElementById(m.id).value;
                if (val && parseInt(val) > 0) {
                    report += `• ${m.label.padEnd(16)} : ${val} PC\n`;
                    hasData = true;
                }
            });

            if(!hasData) report += `  ( Belum ada rincian barang )\n`;

            report += `\n📝 CATATAN TAMBAHAN:\n- ${catatan}\n\n`;
            report += `━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n`;
            report += `Status: Verified by ${jabatan}\n`;
            report += "```";

            document.getElementById('reportPreview').innerText = report;
        }

        async function sendToDiscord() {
            const reportText = document.getElementById('reportPreview').innerText;
            const btn = document.getElementById('btnSendDiscord');
            
            if (!selectedFile) {
                showToast("Bukti foto wajib ada!", "⚠️");
                return;
            }

            try {
                btn.disabled = true;
                btn.innerHTML = `<span>⏳</span> TRANSMITTING...`;

                const formData = new FormData();
                formData.append('content', reportText);
                formData.append('file', selectedFile);

                const response = await fetch(DISCORD_WEBHOOK_URL, {
                    method: 'POST',
                    body: formData
                });

                if (response.ok) {
                    showToast("Laporan Berhasil Terkirim!");
                    btn.innerHTML = `<span>✅</span> SUCCESS`;
                    setTimeout(() => {
                        btn.innerHTML = `<span>🚀</span> Transmit to Discord`;
                        btn.disabled = false;
                    }, 3000);
                } else {
                    throw new Error("Discord API Error");
                }
            } catch (error) {
                showToast("Gagal Terkirim!", "❌");
                btn.disabled = false;
                btn.innerHTML = `<span>🚀</span> Transmit to Discord`;
            }
        }

        function copyReport() {
            const text = document.getElementById('reportPreview').innerText;
            const el = document.createElement('textarea');
            el.value = text;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            showToast("Teks Berhasil Disalin!");
        }

        function resetInputs() {
            if(confirm("Hapus semua data input?")) {
                document.querySelectorAll('input[type="number"]').forEach(i => i.value = "");
                document.getElementById('inCatatan').value = "";
                document.getElementById('fileInput').value = "";
                selectedFile = null;
                document.getElementById('imgContainer').innerHTML = `
                    <div class="text-center opacity-40">
                        <p class="text-3xl mb-2">📸</p>
                        <p class="text-[8px] font-black uppercase tracking-[0.2em]">Upload Image</p>
                    </div>`;
                generateReport();
                showToast("Sistem direset", "🧹");
            }
        }

        window.onload = () => {
            populateStaff();
            const today = new Date();
            const dateStr = today.getDate().toString().padStart(2, '0') + '/' + 
                            (today.getMonth() + 1).toString().padStart(2, '0') + '/' + 
                            today.getFullYear();
            document.getElementById('inTanggal').value = dateStr;
            generateReport();
        };
    </script>
</body>
</html>
